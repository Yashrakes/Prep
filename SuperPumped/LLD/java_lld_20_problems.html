  brute: `public class NaiveEventBus {
    private final Map<String, List<Consumer<Event>>> listeners = new HashMap<>();

    // PROBLEM 1: Publisher blocks until ALL subscribers finish
    // PROBLEM 2: ConcurrentModificationException if subscribe() called mid-publish
    // PROBLEM 3: One subscriber exception kills the rest
    // PROBLEM 4: No wildcard support
    public synchronized void publish(Event event) {
        List<Consumer<Event>> handlers = listeners.getOrDefault(
            event.type(), Collections.emptyList());
        for (Consumer<Event> h : handlers) {
            h.accept(event);  // BLOCKING — kills publisher throughput

`// Java 16+ record — immutable, thread-safe by design
public record Event(String type, Object payload, Instant occurredAt) {
    public Event(String type, Object payload) {
        this(type, payload, Instant.now());
    }
}`,
`public final class EventBus {
    // CopyOnWriteArrayList: reads are lock-free snapshots
    // writes (subscribe/unsubscribe) are infrequent — COW cost acceptable
    private final Map<String, CopyOnWriteArrayList<Consumer<Event>>>
        subscribers = new ConcurrentHashMap<>();

    private static final String WILDCARD = "*";

    // Virtual threads (Java 21) — no pool sizing, millions can exist
    private final ExecutorService executor =
        Executors.newVirtualThreadPerTaskExecutor();

    public void subscribe(String eventType, Consumer<Event> handler) {
        subscribers.computeIfAbsent(eventType,
            k -> new CopyOnWriteArrayList<>()).add(handler);
    }

    public void unsubscribe(String eventType, Consumer<Event> handler) {
        subscribers.getOrDefault(eventType, new CopyOnWriteArrayList<>())
                   .remove(handler);
    }

    // Publisher NEVER blocks — fire and forget
    public void publish(Event event) {
        // Merge specific + wildcard subscribers using Stream
        Stream.concat(
            Optional.ofNullable(subscribers.get(event.type()))
                    .stream().flatMap(Collection::stream),
            Optional.ofNullable(subscribers.get(WILDCARD))
                    .stream().flatMap(Collection::stream)
        ).forEach(handler ->
            executor.submit(() -> safeInvoke(handler, event))
        );
    }

    private void safeInvoke(Consumer<Event> handler, Event event) {
        try { handler.accept(event); }
        catch (Exception ex) {
            // Isolated — other subscribers unaffected
            System.err.printf("[EventBus] handler failed: %s%n", ex.getMessage());
        }
    }
}`,

`// Each node: key (for reverse eviction lookup), value, expiry, list pointers
private static final class Node<K, V> {
    K key; V value; Instant expiresAt;
    Node<K, V> prev, next;

    Node(K key, V value, Duration ttl) {
        this.key = key; this.value = value;
        this.expiresAt = Instant.now().plus(ttl);
    }
    boolean isExpired() { return Instant.now().isAfter(expiresAt); }
}`,
`public final class LRUCache<K, V> {
    private final int capacity;
    private final Duration ttl;
    private final Map<K, Node<K, V>> map;

    // Sentinel head/tail — eliminates null checks everywhere
    // head.next = MRU | tail.prev = LRU (eviction target)
    private final Node<K,V> head = new Node<>(null, null, Duration.ZERO);
    private final Node<K,V> tail = new Node<>(null, null, Duration.ZERO);

    // ReadWriteLock: concurrent readers OR exclusive writer
    private final ReadWriteLock rwLock = new ReentrantReadWriteLock();

    public LRUCache(int capacity, Duration ttl) {
        this.capacity = capacity; this.ttl = ttl;
        this.map = new HashMap<>(capacity);
        head.next = tail; tail.prev = head;
    }

    private void removeNode(Node<K,V> n) {
        n.prev.next = n.next; n.next.prev = n.prev;
    }
    private void insertAfterHead(Node<K,V> n) {
        n.next = head.next; n.prev = head;
        head.next.prev = n; head.next = n;
    }
    private void evictLRU() {
        Node<K,V> lru = tail.prev;
        if (lru == head) return;
        removeNode(lru); map.remove(lru.key);
    }`,
`    public Optional<V> get(K key) {
        // Java doesn't support lock upgrading (read->write).
        // Must release read lock, acquire write lock, then DOUBLE-CHECK.
        rwLock.writeLock().lock();
        try {
            Node<K,V> node = map.get(key);
            if (node == null) return Optional.empty();
            if (node.isExpired()) {
                removeNode(node); map.remove(key);
                return Optional.empty();
            }
            removeNode(node); insertAfterHead(node); // O(1) promote to MRU
            return Optional.of(node.value);
        } finally { rwLock.writeLock().unlock(); }
    }

    public void put(K key, V value) {
        rwLock.writeLock().lock();
        try {
            Node<K,V> existing = map.get(key);
            if (existing != null) {
                existing.value = value;
                existing.expiresAt = Instant.now().plus(ttl);
                removeNode(existing); insertAfterHead(existing);
                return;
            }
            if (map.size() >= capacity) evictLRU();
            Node<K,V> n = new Node<>(key, value, ttl);
            map.put(key, n); insertAfterHead(n);
        } finally { rwLock.writeLock().unlock(); }
    }`,
`var cache = new LRUCache<String, String>(3, Duration.ofSeconds(2));
cache.put("u1","Yash"); cache.put("u2","Priya"); cache.put("u3","Raj");
cache.get("u1"); // u1 = MRU, order: u1 > u3 > u2

cache.put("u4","Amit"); // evicts u2 (LRU)
System.out.println(cache.get("u2")); // Optional.empty

Thread.sleep(2500); // TTL expires
System.out.println(cache.get("u1")); // Optional.empty`

    private final int max;
    public QuickLRU(int max) { super(max, 0.75f, true); this.max = max; }
    protected boolean removeEldestEntry(Map.Entry<K,V> e) { return size() > max; }
}
// Wrap: Collections.synchronizedMap(new QuickLRU<>(100))
// Limitations: coarse lock, no TTL, no eviction listener`,

    ["get() complexity","O(n) with TTL scan","O(1) always"],
    ["put() complexity","O(n) eviction search","O(1) always"],

`// Virtual refill: no background thread per user.
// On each tryAcquire(), calculate elapsed time and derive earned tokens.
// This is how Redis implements it internally.
final class TokenBucket {
    private final long capacity;
    private final double tokensPerNano;
    private final AtomicLong tokensScaled; // fixed-point: actual = raw / 1e9
    private volatile long lastNanos;
    volatile long lastAccessMs = System.currentTimeMillis();
    private static final long SCALE = 1_000_000_000L;

    TokenBucket(long capacity, double tokensPerSecond) {
        this.capacity = capacity;
        this.tokensPerNano = tokensPerSecond / 1_000_000_000.0;
        this.tokensScaled = new AtomicLong(capacity * SCALE);
        this.lastNanos = System.nanoTime();
    }

    boolean tryAcquire() {
        lastAccessMs = System.currentTimeMillis();
        long now = System.nanoTime(); // monotonic — never goes backwards
        long elapsed = now - lastNanos;
        long earned = (long)(elapsed * tokensPerNano * SCALE);
        if (earned > 0) {
            tokensScaled.updateAndGet(c -> Math.min(capacity * SCALE, c + earned));
            lastNanos = now;
        }
        // Atomic CAS: consume 1 token or leave unchanged
        long after = tokensScaled.updateAndGet(c -> c >= SCALE ? c - SCALE : c);
        return after < tokensScaled.get() + SCALE; // did it decrease?
    }
}`,
`public final class RateLimiter {
    private final long capacity;
    private final double tokensPerSecond;
    // ConcurrentHashMap: per-user bucket isolation
    // Different users NEVER contend on each other
    private final ConcurrentHashMap<String, TokenBucket> buckets =
        new ConcurrentHashMap<>();

    public RateLimiter(long capacity, long refill, Duration per) {
        this.capacity = capacity;
        this.tokensPerSecond = (double) refill / per.toSeconds();
    }

    public boolean tryAcquire(String userId) {
        // computeIfAbsent is atomic — no duplicate bucket race
        return buckets.computeIfAbsent(userId,
            k -> new TokenBucket(capacity, tokensPerSecond)).tryAcquire();
    }
}`,
`// One daemon thread for ALL users — cleanup inactive buckets

`import java.util.concurrent.locks.*;

public final class BoundedBlockingQueue<T> {
    private final Object[] data;
    private int head, tail, count;
    private final int capacity;

    private final ReentrantLock lock = new ReentrantLock();
    // Two separate Conditions: producers wait on notFull, consumers on notEmpty
    // This avoids waking producers when a producer should wake, and vice versa
    private final Condition notFull  = lock.newCondition();
    private final Condition notEmpty = lock.newCondition();

    public BoundedBlockingQueue(int capacity) {
        this.capacity = capacity;
        this.data = new Object[capacity];
    }

    public void put(T item) throws InterruptedException {
        lock.lock();
        try {
            while (count == capacity) notFull.await(); // block producer
            data[tail] = item;
            tail = (tail + 1) % capacity; // circular buffer
            count++;
            notEmpty.signal(); // wake ONE consumer — not all
        } finally { lock.unlock(); }
    }

    @SuppressWarnings("unchecked")
    public T take() throws InterruptedException {
        lock.lock();
        try {
            while (count == 0) notEmpty.await(); // block consumer
            T item = (T) data[head];
            data[head] = null; // help GC
            head = (head + 1) % capacity;
            count--;
            notFull.signal(); // wake ONE producer
            return item;
        } finally { lock.unlock(); }
    }

    public boolean offer(T item, long timeout, TimeUnit unit)
            throws InterruptedException {
        lock.lock();
        try {
            long nanos = unit.toNanos(timeout);
            while (count == capacity) {
                if (nanos <= 0) return false; // timed out
                nanos = notFull.awaitNanos(nanos); // returns remaining nanos
            }
            data[tail] = item;
            tail = (tail + 1) % capacity;
            count++;
            notEmpty.signal();
            return true;
        } finally { lock.unlock(); }
    }

    public T poll(long timeout, TimeUnit unit) throws InterruptedException {
        lock.lock();
        try {
            long nanos = unit.toNanos(timeout);
            while (count == 0) {
                if (nanos <= 0) return null;
                nanos = notEmpty.awaitNanos(nanos);
            }
            @SuppressWarnings("unchecked") T item = (T) data[head];
            data[head] = null;
            head = (head + 1) % capacity;
            count--;
            notFull.signal();
            return item;
        } finally { lock.unlock(); }
    }

    public int size() {
        lock.lock(); try { return count; } finally { lock.unlock(); }
    }
}`,

`// Worker thread: loops forever pulling tasks from the queue
// Terminates when it receives a special POISON_PILL sentinel
private static final Runnable POISON_PILL = () -> {};

private class Worker implements Runnable {
    @Override
    public void run() {
        while (true) {
            try {
                Runnable task = taskQueue.take(); // blocks until work available
                if (task == POISON_PILL) {
                    taskQueue.put(POISON_PILL); // re-enqueue for other workers
                    break; // this worker exits
                }
                try { task.run(); }
                catch (Exception e) {
                    // Log but don't kill worker — worker survives task exceptions
                    System.err.println("Task failed: " + e.getMessage());
                }
            } catch (InterruptedException e) {
                Thread.currentThread().interrupt();
                break; // shutdownNow() interrupted us
            }
        }
    }
}`,
`public final class MyThreadPool {
    enum State { RUNNING, SHUTDOWN, TERMINATED }

    private final BlockingQueue<Runnable> taskQueue;
    private final List<Thread> workers;
    private volatile State state = State.RUNNING;
    private final int poolSize;

    public MyThreadPool(int poolSize) {
        this.poolSize = poolSize;
        this.taskQueue = new LinkedBlockingQueue<>();
        this.workers = new ArrayList<>(poolSize);
        for (int i = 0; i < poolSize; i++) {
            Thread t = new Thread(new Worker(), "pool-worker-" + i);
            t.start();
            workers.add(t);
        }
    }

    public void submit(Runnable task) {
        if (state != State.RUNNING)
            throw new RejectedExecutionException("Pool is shutting down");
        taskQueue.offer(task); // non-blocking put; queue is unbounded here
    }

    public void shutdown() {
        state = State.SHUTDOWN;
        taskQueue.offer(POISON_PILL); // one pill starts the cascade
    }

    public void shutdownNow() {
        state = State.SHUTDOWN;
        taskQueue.clear(); // discard pending tasks
        workers.forEach(Thread::interrupt); // wake and kill all workers
    }

    public void awaitTermination(long timeout, TimeUnit unit)
            throws InterruptedException {
        long deadline = System.currentTimeMillis() + unit.toMillis(timeout);
        for (Thread w : workers) {
            long remaining = deadline - System.currentTimeMillis();
            if (remaining <= 0) break;
            w.join(remaining);
        }
        state = State.TERMINATED;
    }
}`,

`import java.util.concurrent.locks.*;

public final class ConsistentHashRing {
    // TreeMap maintains sorted order — enables O(log n) clockwise lookup
    private final TreeMap<Integer, String> ring = new TreeMap<>();
    private final int virtualNodes;
    // ReadWriteLock: reads (route) are frequent, writes (add/remove) are rare
    private final ReadWriteLock lock = new ReentrantReadWriteLock();

    public ConsistentHashRing(int virtualNodes) {
        this.virtualNodes = virtualNodes;
    }

    private int hash(String key) {
        // FNV-1a: better distribution than String.hashCode()
        // In production: MurmurHash3 or MD5 first 4 bytes
        int h = 0x811c9dc5;
        for (byte b : key.getBytes()) {
            h ^= b; h *= 0x01000193;
        }
        return h & Integer.MAX_VALUE; // keep positive
    }

    public void addNode(String node) {
        lock.writeLock().lock();
        try {
            for (int i = 0; i < virtualNodes; i++) {
                int pos = hash(node + "#vnode-" + i);
                ring.put(pos, node); // multiple positions per server
            }
        } finally { lock.writeLock().unlock(); }
    }

    public void removeNode(String node) {
        lock.writeLock().lock();
        try {
            for (int i = 0; i < virtualNodes; i++) {
                int pos = hash(node + "#vnode-" + i);
                ring.remove(pos);
            }
        } finally { lock.writeLock().unlock(); }
    }

    public String getNode(String key) {
        if (ring.isEmpty()) return null;
        lock.readLock().lock();
        try {
            int pos = hash(key);
            // ceilingKey: first key >= pos (clockwise next node)
            // If pos > all keys, wrap around to ring.firstKey()
            Integer nodePos = ring.ceilingKey(pos);
            if (nodePos == null) nodePos = ring.firstKey(); // wrap
            return ring.get(nodePos);
        } finally { lock.readLock().unlock(); }
    }

    public Map<String, Long> distribution(List<String> keys) {
        return keys.stream()
            .collect(Collectors.groupingBy(this::getNode, Collectors.counting()));
    }
}`,

`public final class ReadWriteLock {
    private int readers = 0;        // active readers
    private int writers = 0;        // active writers (0 or 1)
    private int writeRequests = 0;  // waiting writers — starvation prevention

    // readLock: wait if any writer is active OR waiting (starvation prevention)
    public synchronized void readLock() throws InterruptedException {
        while (writers > 0 || writeRequests > 0) {
            wait(); // release monitor, sleep, re-acquire on notify
        }
        readers++;
    }

    public synchronized void readUnlock() {
        readers--;
        notifyAll(); // wake waiting writers
    }

    // writeLock: exclusive — wait for all readers AND writers to finish
    public synchronized void writeLock() throws InterruptedException {
        writeRequests++; // announce intent — blocks new readers
        while (readers > 0 || writers > 0) {
            wait();
        }
        writeRequests--;
        writers++;
    }

    public synchronized void writeUnlock() {
        writers--;
        notifyAll(); // wake both readers and writers
    }
}

// Usage — always unlock in finally!
class SafeCache {
    private final ReadWriteLock lock = new ReadWriteLock();
    private final Map<String, String> data = new HashMap<>();

    public String get(String key) throws InterruptedException {
        lock.readLock();
        try { return data.get(key); }
        finally { lock.readUnlock(); }
    }

    public void put(String key, String value) throws InterruptedException {
        lock.writeLock();
        try { data.put(key, value); }
        finally { lock.writeUnlock(); }
    }
}`,

    private final Segment<K,V>[] segments;
    private final int segmentCount;

    @SuppressWarnings("unchecked")
    public SegmentedMap(int segmentCount) {
        this.segmentCount = segmentCount;
        this.segments = new Segment[segmentCount];
        for (int i = 0; i < segmentCount; i++) segments[i] = new Segment<>();
    }

    // Determine which segment this key belongs to
    // Using >>> (unsigned shift) ensures positive result even for negative hashCodes
    private Segment<K,V> segmentFor(K key) {
        int idx = (key.hashCode() >>> 1) % segmentCount;
        return segments[idx];

    public void put(K key, V value)  { segmentFor(key).put(key, value); }
    public V remove(K key)           { return segmentFor(key).remove(key); }

    public int size() {

`// Job handle returned to caller — used for cancellation and state tracking
public final class JobHandle {
    public enum State { PENDING, RUNNING, DONE, CANCELLED, FAILED }

    private final String jobId;
    private final ScheduledFuture<?> future;
    private volatile State state = State.PENDING;

    JobHandle(String jobId, ScheduledFuture<?> future) {
        this.jobId = jobId; this.future = future;
    }

    public boolean cancel() {
        if (state == State.PENDING) {
            boolean cancelled = future.cancel(false); // don't interrupt if running
            if (cancelled) state = State.CANCELLED;
            return cancelled;
        }
        return false;
    }

    public State getState() { return state; }
    public String getJobId() { return jobId; }

    void markRunning()   { state = State.RUNNING; }
    void markDone()      { state = State.DONE; }
    void markFailed()    { state = State.FAILED; }
}`,
`public final class JobScheduler {
    private final ScheduledExecutorService executor;
    private final Map<String, JobHandle> handles = new ConcurrentHashMap<>();
    private final AtomicLong counter = new AtomicLong();

    public JobScheduler(int threads) {
        this.executor = Executors.newScheduledThreadPool(threads);
    }

    public JobHandle schedule(Runnable job, long delay, TimeUnit unit) {
        String id = "job-" + counter.incrementAndGet();
        // Wrap job with state tracking — decoupled from caller
        Runnable wrapped = wrapJob(id, job, false);
        ScheduledFuture<?> future = executor.schedule(wrapped, delay, unit);
        JobHandle handle = new JobHandle(id, future);
        handles.put(id, handle);
        return handle;
    }

    public JobHandle scheduleAtFixedRate(Runnable job, long initDelay,
                                          long period, TimeUnit unit) {
        String id = "job-" + counter.incrementAndGet();
        Runnable wrapped = wrapJob(id, job, true);
        ScheduledFuture<?> future = executor.scheduleAtFixedRate(
            wrapped, initDelay, period, unit);
        JobHandle handle = new JobHandle(id, future);
        handles.put(id, handle);
        return handle;
    }

    private Runnable wrapJob(String id, Runnable job, boolean recurring) {
        return () -> {
            JobHandle handle = handles.get(id);
            if (handle == null || handle.getState() == JobHandle.State.CANCELLED) return;
            handle.markRunning();
            try {
                job.run();
                if (!recurring) { handle.markDone(); handles.remove(id); }
                else handle.markRunning(); // stays RUNNING between executions
            } catch (Exception e) {
                handle.markFailed();
                System.err.println("Job " + id + " failed: " + e.getMessage());
                // For recurring: exception stops recurrence in ScheduledExecutor
                // re-throw to let executor log it; handle shows FAILED
                throw e;
            }
        };
    }

    public void shutdown() { executor.shutdown(); }
}`,

`import java.util.concurrent.*;
import java.util.function.*;

public final class ObjectPool<T> {
    private final BlockingQueue<T> available;
    private final Supplier<T> factory;       // how to create new objects
    private final Predicate<T> validator;    // how to check if object still usable
    private final long timeoutMs;
    private final int maxSize;
    private final AtomicInteger created = new AtomicInteger();

    public ObjectPool(Supplier<T> factory, Predicate<T> validator,
                      int maxSize, Duration timeout) {
        this.factory   = factory;
        this.validator = validator;
        this.maxSize   = maxSize;
        this.timeoutMs = timeout.toMillis();
        this.available = new LinkedBlockingQueue<>(maxSize);
        // Pre-warm with minimum objects (optional — here we lazy-create)
    }

    // AutoCloseable wrapper — enables try-with-resources
    public final class Borrowed implements AutoCloseable {
        private final T obj;
        private boolean released = false;

        Borrowed(T obj) { this.obj = obj; }
        public T get() { return obj; }

        @Override
        public void close() {
            if (!released) { released = true; release(obj); }
        }
    }

    public Borrowed borrow() throws InterruptedException {
        long deadline = System.currentTimeMillis() + timeoutMs;
        while (true) {
            // Try to get an available object first
            T obj = available.poll();

            if (obj != null) {
                if (validator.test(obj)) return new Borrowed(obj); // valid, use it
                // Invalid (stale connection) — discard and try to create new
                created.decrementAndGet();
            }

            // No available objects — can we create a new one?
            if (created.get() < maxSize &&
                created.incrementAndGet() <= maxSize) {
                return new Borrowed(factory.get()); // create fresh
            }
            created.decrementAndGet(); // rolled back — pool full

            // Pool full and all borrowed — wait for a release
            long remaining = deadline - System.currentTimeMillis();
            if (remaining <= 0) throw new TimeoutException("Pool exhausted");
            obj = available.poll(remaining, TimeUnit.MILLISECONDS);
            if (obj == null) throw new TimeoutException("Pool exhausted after timeout");
            if (validator.test(obj)) return new Borrowed(obj);
            created.decrementAndGet(); // stale, discarded
        }
    }

    private void release(T obj) {
        if (!available.offer(obj)) {
            // Queue full — discard (shouldn't happen in correct usage)
            created.decrementAndGet();
        }
    }

    public int available() { return available.size(); }
    public int created()   { return created.get(); }
}`,
`// Simulating a DB connection pool

}

`import java.math.BigDecimal;
import java.time.LocalDateTime;
import java.util.List;

// Rules for true immutability:
// 1. Class is final (no subclass can add mutable state)
// 2. All fields private + final
// 3. Defensive copy on CONSTRUCTION (don't trust caller's input)
// 4. Defensive copy on RETURN (don't expose internal references)
// 5. Use immutable types (LocalDateTime not Date, BigDecimal not double)
public final class Transaction {
    private final String id;
    private final BigDecimal amount;        // immutable — no setters
    private final List<String> tags;        // we store an unmodifiable copy
    private final LocalDateTime createdAt;  // immutable — use this, not Date

    public Transaction(String id, BigDecimal amount,
                       List<String> tags, LocalDateTime createdAt) {
        this.id        = Objects.requireNonNull(id);
        this.amount    = Objects.requireNonNull(amount);
        // Defensive copy on construction: store a snapshot, not the caller's list
        this.tags      = List.copyOf(tags);  // Java 10+ unmodifiable deep copy
        this.createdAt = Objects.requireNonNull(createdAt); // LocalDateTime is immutable
    }

    public String getId()             { return id; }          // String is immutable — safe
    public BigDecimal getAmount()     { return amount; }      // BigDecimal is immutable — safe
    public LocalDateTime getCreatedAt(){ return createdAt; }  // LocalDateTime is immutable
    // Return a copy — even though List.copyOf is unmodifiable, the practice is correct
    public List<String> getTags()     { return tags; }        // already unmodifiable

    // equals/hashCode based on VALUE, not identity
    @Override public boolean equals(Object o) {
        if (this == o) return true;
        if (!(o instanceof Transaction t)) return false;
        return id.equals(t.id) && amount.compareTo(t.amount) == 0;
    }
    @Override public int hashCode() { return Objects.hash(id, amount); }
    @Override public String toString() {
        return "Transaction[id=%s, amount=%s]".formatted(id, amount);
    }
}`,
`// Java 16+ records: immutable by default, equals/hashCode/toString generated
// Records enforce: all fields final, all-args constructor, no setters
public record TransactionRecord(
    String id,
    BigDecimal amount,
    List<String> tags,       // CAUTION: record does NOT defensive copy for you!
    LocalDateTime createdAt
) {
    // Compact canonical constructor — add validation and defensive copying here
    public TransactionRecord {
        Objects.requireNonNull(id, "id required");
        if (amount.compareTo(BigDecimal.ZERO) < 0)

        tags = List.copyOf(tags); // must defensive copy even in record

}

`// Three-state machine with atomic transitions
public enum State { CLOSED, OPEN, HALF_OPEN }

// AtomicReference for state ensures visibility across threads without synchronized
private final AtomicReference<State> state = new AtomicReference<>(State.CLOSED);
private final AtomicInteger failures = new AtomicInteger(0);
private volatile long openedAt = 0; // when did we enter OPEN state`,
`public final class CircuitBreaker {
    private final String name;
    private final int failureThreshold;
    private final Duration cooldown;

    private final AtomicReference<State> state = new AtomicReference<>(State.CLOSED);
    private final AtomicInteger failures  = new AtomicInteger(0);
    private volatile long openedAt = 0;

    public CircuitBreaker(String name, int failureThreshold, Duration cooldown) {
        this.name = name;
        this.failureThreshold = failureThreshold;
        this.cooldown = cooldown;
    }

    public <T> T execute(Supplier<T> call) {
        State current = state.get();

        if (current == State.OPEN) {
            if (cooldownExpired()) {
                // CAS: only ONE thread transitions OPEN->HALF_OPEN (probe thread)
                if (state.compareAndSet(State.OPEN, State.HALF_OPEN)) {
                    return probe(call); // let this thread be the probe
                }
            }
            throw new CircuitOpenException("Circuit " + name + " is OPEN");
        }

        if (current == State.HALF_OPEN) {
            return probe(call); // only one thread reaches here at a time via CAS
        }

        // CLOSED state — normal path
        return executeAndTrack(call);
    }

    private <T> T probe(Supplier<T> call) {
        try {
            T result = call.get();
            // Probe succeeded — reset and close
            failures.set(0);
            state.set(State.CLOSED);
            System.out.println("[CB:" + name + "] Probe success → CLOSED");
            return result;
        } catch (Exception e) {
            // Probe failed — reopen with fresh cooldown
            openedAt = System.currentTimeMillis();
            state.set(State.OPEN);
            System.out.println("[CB:" + name + "] Probe failed → OPEN again");
            throw e;
        }
    }

    private <T> T executeAndTrack(Supplier<T> call) {
        try {
            T result = call.get();
            failures.set(0); // reset on success
            return result;
        } catch (Exception e) {
            int count = failures.incrementAndGet();
            if (count >= failureThreshold) {
                openedAt = System.currentTimeMillis();
                state.set(State.OPEN); // trip the circuit
                System.out.printf("[CB:%s] Tripped after %d failures → OPEN%n", name, count);
            }
            throw e;
        }
    }

    private boolean cooldownExpired() {
        return System.currentTimeMillis() - openedAt >= cooldown.toMillis();
    }

    public State getState() { return state.get(); }
}

class CircuitOpenException extends RuntimeException {
    public CircuitOpenException(String msg) { super(msg); }
}`,

`public final class Subject<T> {
    // CopyOnWriteArrayList: observers can unsubscribe from within onEvent()
    // without ConcurrentModificationException — COWAL iterates a snapshot
    private final CopyOnWriteArrayList<Observer<T>> observers =
        new CopyOnWriteArrayList<>();

    public void addObserver(Observer<T> observer) {
        observers.addIfAbsent(observer); // dedup — same observer not added twice
    }

    public void removeObserver(Observer<T> observer) {
        observers.remove(observer);
    }

    // Notify all observers — iterate a snapshot (COWAL guarantee)
    public void notifyObservers(T event) {
        for (Observer<T> observer : observers) {  // iterates snapshot
            try {
                observer.onEvent(event);
            } catch (Exception e) {
                // Isolate per observer — one crash doesn't skip the rest
                System.err.println("Observer failed: " + e.getMessage());
            }
        }
    }

    public int observerCount() { return observers.size(); }
}

`import java.util.concurrent.*;
import java.util.concurrent.atomic.*;

public final class ResourceThrottler {
    private final String resourceName;
    private final Semaphore semaphore; // fair=true: FIFO ordering — no starvation
    private final AtomicLong rejections = new AtomicLong();
    private final AtomicLong acquisitions = new AtomicLong();

    public ResourceThrottler(String resourceName, int maxConcurrent) {
        this.resourceName = resourceName;
        // fair=true: threads acquire permits in FIFO order — prevents starvation
        this.semaphore = new Semaphore(maxConcurrent, true);
    }

    // AutoCloseable permit — enables try-with-resources
    public final class Permit implements AutoCloseable {
        private boolean released = false;
        @Override
        public void close() {
            if (!released) { released = true; semaphore.release(); }
        }
    }

    public Permit acquire(Duration timeout) throws InterruptedException {
        boolean acquired = semaphore.tryAcquire(
            timeout.toMillis(), TimeUnit.MILLISECONDS);

        if (!acquired) {
            rejections.incrementAndGet();
            throw new AcquireTimeoutException(
                "Could not acquire permit for " + resourceName +
                " within " + timeout);
        }
        acquisitions.incrementAndGet();
        return new Permit();
    }

    // Bulkhead: create separate throttlers per downstream service
    // so one slow service doesn't exhaust permits for unrelated calls
    public static Map<String, ResourceThrottler> bulkhead(
            Map<String, Integer> config) {
        return config.entrySet().stream()
            .collect(Collectors.toMap(
                Map.Entry::getKey,
                e -> new ResourceThrottler(e.getKey(), e.getValue())
            ));
    }

    // Metrics
    public int availablePermits()  { return semaphore.availablePermits(); }
    public int queueLength()       { return semaphore.getQueueLength(); }
    public long rejectionCount()   { return rejections.get(); }
    public long acquisitionCount() { return acquisitions.get(); }

    public String stats() {
        return "%s | available=%d | queued=%d | rejected=%d".formatted(
            resourceName, availablePermits(), queueLength(), rejectionCount());
    }
}

class AcquireTimeoutException extends RuntimeException {
    public AcquireTimeoutException(String msg) { super(msg); }
}`,

class BrokenBank {

        synchronized(from) {         // Thread 1 holds A, Thread 2 holds B
            synchronized(to) {       // Thread 1 waits for B, Thread 2 waits for A

            }
        }
    }

`// DELIBERATE DEADLOCK — for illustration only

`// PREVENTION 1: Lock Ordering — always acquire locks in a consistent global order
class SafeBankOrdering {
    void transfer(Account from, Account to, int amount) {
        // Order by account ID — same order ALWAYS regardless of from/to direction
        Account first  = from.id() < to.id() ? from : to;
        Account second = from.id() < to.id() ? to : from;

        synchronized(first) {        // always lock lower-ID account first
            synchronized(second) {   // no circular wait possible
                from.debit(amount);
                to.credit(amount);
            }
        }
    }
    // Thread 1: transfer(A→B): locks A(1) then B(2)
    // Thread 2: transfer(B→A): locks A(1) then B(2) — SAME ORDER!
    // Neither can deadlock — they queue on A(1), proceed sequentially
}`,
`// PREVENTION 2: tryLock with timeout — back off if can't acquire
class SafeBankTryLock {
    private final Map<String, ReentrantLock> locks = new ConcurrentHashMap<>();

    void transfer(Account from, Account to, int amount) throws InterruptedException {
        ReentrantLock l1 = locks.computeIfAbsent(from.id(), k -> new ReentrantLock());
        ReentrantLock l2 = locks.computeIfAbsent(to.id(), k -> new ReentrantLock());

        while (true) {
            if (l1.tryLock(50, TimeUnit.MILLISECONDS)) {
                try {
                    if (l2.tryLock(50, TimeUnit.MILLISECONDS)) {
                        try {
                            from.debit(amount); to.credit(amount);
                            return; // success
                        } finally { l2.unlock(); }
                    }
                    // Couldn't get l2 — back off and retry
                } finally { l1.unlock(); }
            }
            Thread.sleep(new Random().nextInt(10)); // random backoff
        }
    }
}`,
`// PREVENTION 3: Lock-free using AtomicInteger CAS — no locks = no deadlock possible
class LockFreeAccount {
    private final AtomicInteger balance;

    boolean debit(int amount) {
        return balance.updateAndGet(b -> b >= amount ? b - amount : b) >= 0;
    }
    void credit(int amount) { balance.addAndGet(amount); }
}
// AtomicInteger.updateAndGet() uses CPU CAS instruction (LOCK CMPXCHG)
// Guaranteed atomic: no OS lock, no deadlock, no starvation (wait-free)`,

long[] deadlockedIds = tmx.findDeadlockedThreads(); // null if no deadlock

if (deadlockedIds != null) {
    ThreadInfo[] infos = tmx.getThreadInfo(deadlockedIds, true, true);
    for (ThreadInfo info : infos) {
        System.out.println("DEADLOCK: " + info.getThreadName());
        System.out.println("  Waiting for: " + info.getLockName());
        System.out.println("  Held by:     " + info.getLockOwnerName());
        for (StackTraceElement e : info.getStackTrace())
            System.out.println("    " + e);
    }
}
// Can be run from a ScheduledExecutorService to periodically health-check`

  alt: `// LIVELOCK: threads are active but no progress — they keep yielding to each other
// Example: two threads both see the other has a lock, both back off, retry, repeat.
// The tryLock+backoff approach can degrade into livelock without random jitter.
// Fix: exponential backoff with random jitter (same as TCP congestion control).

// STARVATION: a thread never gets CPU time because higher-priority threads always win.
// Fix: Semaphore(fair=true) or ReentrantLock(fair=true) — FIFO ordering.`,

`// Base component interface — all decorators AND implementations share this type
public interface DataReader extends AutoCloseable {
    String read() throws Exception;
    void close() throws Exception;
}

// Concrete component: reads from a string source (in production: file/socket)
public final class StringDataReader implements DataReader {
    private final String source;
    private boolean consumed = false;

    public StringDataReader(String source) { this.source = source; }

    @Override
    public String read() {
        if (consumed) return "";
        consumed = true; return source;
    }
    @Override public void close() { /* nothing to release */ }
}`,
`// Base decorator: wraps another DataReader — all decorators extend this
public abstract class DataReaderDecorator implements DataReader {
    protected final DataReader wrapped;
    protected DataReaderDecorator(DataReader wrapped) { this.wrapped = wrapped; }
    @Override public void close() throws Exception { wrapped.close(); }
}

// DECORATOR 1: Logging — adds read timing and byte count
public final class LoggingReader extends DataReaderDecorator {
    public LoggingReader(DataReader wrapped) { super(wrapped); }

    @Override
    public String read() throws Exception {
        long start = System.nanoTime();
        String data = wrapped.read();
        long ms = (System.nanoTime() - start) / 1_000_000;
        System.out.printf("[LOG] Read %d chars in %dms%n", data.length(), ms);
        return data;
    }
}

// DECORATOR 2: Uppercase transform (simulates compression/decompression)
public final class UpperCaseReader extends DataReaderDecorator {
    public UpperCaseReader(DataReader wrapped) { super(wrapped); }

    @Override
    public String read() throws Exception {
        return wrapped.read().toUpperCase();
    }
}

// DECORATOR 3: Prefix/Suffix wrapper (simulates encryption headers)
public final class EncryptingReader extends DataReaderDecorator {
    private final String key;
    public EncryptingReader(DataReader wrapped, String key) {
        super(wrapped); this.key = key;
    }

    @Override
    public String read() throws Exception {
        String data = wrapped.read();
        // XOR with key length for demo — use AES in production
        return "[ENC:" + key.length() + "]" + data + "[/ENC]";
    }
}

// DECORATOR 4: Trimming (simulates buffering — accumulates then flushes)
public final class TrimmingReader extends DataReaderDecorator {
    public TrimmingReader(DataReader wrapped) { super(wrapped); }

    @Override
    public String read() throws Exception {
        return wrapped.read().trim();
    }
}`,
`// Compose decorators in any order — each adds one concern

            )

);

// Java's try-with-resources — close() cascades through decorator chain

}

// Now: log FIRST (logs lowercase), then uppercase`

`import java.util.concurrent.*;
import java.util.concurrent.atomic.*;
import java.util.function.*;

public final class Pipeline<T> {
    // LinkedBlockingQueue with bound = backpressure mechanism
    // put() blocks producers when full — naturally throttles them
    private final LinkedBlockingQueue<T> queue;
    private final int producerCount, consumerCount;
    private volatile boolean running = true;
    private volatile boolean shutdown = false;

    // Metrics
    private final AtomicLong produced  = new AtomicLong();
    private final AtomicLong consumed  = new AtomicLong();
    private final AtomicLong dropped   = new AtomicLong();

    private final List<Thread> threads = new ArrayList<>();

    public Pipeline(int producers, int consumers, int queueCapacity) {
        this.producerCount = producers;
        this.consumerCount = consumers;
        this.queue = new LinkedBlockingQueue<>(queueCapacity); // bounded!
    }

    public void startProducing(Supplier<T> itemFactory) {
        for (int i = 0; i < producerCount; i++) {
            Thread t = Thread.ofVirtual().start(() -> {
                while (running) {
                    try {
                        T item = itemFactory.get();
                        // BACKPRESSURE: put() blocks if queue full
                        // Producer thread parks until consumer creates space
                        queue.put(item);
                        produced.incrementAndGet();
                    } catch (InterruptedException e) {
                        Thread.currentThread().interrupt(); break;
                    }
                }
            });
            threads.add(t);
        }
    }

    public void startConsuming(Consumer<T> processor) {
        for (int i = 0; i < consumerCount; i++) {
            Thread t = Thread.ofVirtual().start(() -> {
                while (!shutdown || !queue.isEmpty()) {
                    try {
                        // poll() with timeout — consumers park when empty
                        // Returns null on timeout — checks shutdown condition
                        T item = queue.poll(100, TimeUnit.MILLISECONDS);
                        if (item != null) {
                            processor.accept(item);
                            consumed.incrementAndGet();
                        }
                    } catch (InterruptedException e) {
                        Thread.currentThread().interrupt(); break;
                    }
                }
            });
            threads.add(t);
        }
    }

    public void shutdown() throws InterruptedException {
        running = false;   // stop producers
        // Consumers continue draining the queue until it's empty (shutdown=false still)
        for (Thread t : threads.subList(0, producerCount)) t.join();
        shutdown = true;   // now consumers know producers are done + queue drained
        for (Thread t : threads.subList(producerCount, threads.size())) t.join();
    }`,
`    public Metrics snapshot() {
        return new Metrics(
            produced.get(), consumed.get(), dropped.get(), queue.size());
    }

    public record Metrics(long produced, long consumed, long dropped, int queueSize) {
        public double backpressureRatio() {
            return produced == 0 ? 0 : (double) dropped / produced;
        }
        @Override public String toString() {
            return "produced=%d consumed=%d dropped=%d queueSize=%d".formatted(
                produced, consumed, dropped, queueSize);
        }
    }
}`,

  ],
  altTitle: "Project Reactor — reactive backpressure (production standard)",
  alt: `// Reactive Streams: consumers REQUEST items — producers send only what's asked
// This is demand-driven backpressure — superior to blocking queues for async systems
Flux.range(1, 1_000_000)
    .onBackpressureBuffer(100)  // buffer strategy: hold 100, then drop
    .publishOn(Schedulers.boundedElastic())
    .subscribe(item -> slowProcess(item));
// Strategies: BUFFER (queue), DROP (discard), LATEST (keep newest), ERROR (fail fast)`,

    ["Consumer when empty?","Busy-poll with sleep","Parks in poll() — zero CPU"],
    ["Shutdown drains queue?","No — items lost","Yes — consumers drain before stopping"],
    ["Metrics?","None","produced/consumed/dropped/queueSize"],
    ["Production alternative?","Manual queues","Reactor Flux / RxJava Observable"],
